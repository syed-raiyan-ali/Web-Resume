<!doctype html>

<head>
  <meta charset="UTF-8" />
  <link id="dynamic-favicon" rel="icon" href="/g-suitcase.png" type="image/png">
  <script>
    (function () {
      const favicon = document.getElementById('dynamic-favicon');
      const updateFavicon = (e) => {
        try {
          const isDark = e ? e.matches : window.matchMedia('(prefers-color-scheme: dark)').matches;
          favicon.href = isDark ? '/w-suitcase.png' : '/b-suitcase.png';
        } catch (err) {
          favicon.href = '/g-suitcase.png';
        }
      };

      const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      if (darkModeMediaQuery.addEventListener) {
        darkModeMediaQuery.addEventListener('change', updateFavicon);
      } else if (darkModeMediaQuery.addListener) { // Fallback for older browsers
        darkModeMediaQuery.addListener(updateFavicon);
      }
      updateFavicon();
    })();
  </script>
